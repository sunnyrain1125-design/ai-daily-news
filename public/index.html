<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Daily News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ["Space Grotesk", "sans-serif"],
              body: ["Noto Sans TC", "sans-serif"]
            },
            colors: {
              ink: "#060816",
              panel: "#0d1328",
              edge: "#1d2a52",
              neon: "#6ee7ff",
              mint: "#78f2b3",
              ember: "#ff8a5b"
            },
            boxShadow: {
              glow: "0 0 0 1px rgba(110,231,255,.15), 0 30px 80px rgba(0,0,0,.45)"
            },
            animation: {
              "fade-rise": "fadeRise .7s ease forwards"
            },
            keyframes: {
              fadeRise: {
                "0%": { opacity: 0, transform: "translateY(18px)" },
                "100%": { opacity: 1, transform: "translateY(0)" }
              }
            }
          }
        }
      };
    </script>
    <style>
      body {
        background:
          radial-gradient(circle at top left, rgba(110, 231, 255, 0.08), transparent 28%),
          radial-gradient(circle at 85% 15%, rgba(120, 242, 179, 0.08), transparent 24%),
          linear-gradient(180deg, #05070f 0%, #09101f 55%, #04060d 100%);
      }
    </style>
  </head>
  <body class="font-body text-slate-100 min-h-screen">
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
      <div class="absolute -top-20 -left-16 h-64 w-64 rounded-full bg-cyan-400/10 blur-3xl"></div>
      <div class="absolute top-1/3 right-0 h-72 w-72 rounded-full bg-emerald-400/10 blur-3xl"></div>
      <div class="absolute bottom-0 left-1/3 h-80 w-80 rounded-full bg-orange-400/10 blur-3xl"></div>
    </div>

    <main class="relative mx-auto max-w-7xl px-6 py-10 lg:px-10">
      <header class="mb-10 animate-fade-rise opacity-0">
        <div class="mb-5 inline-flex items-center gap-3 rounded-full border border-cyan-300/20 bg-white/5 px-4 py-2 text-xs tracking-[0.28em] text-cyan-200 uppercase">
          <span class="h-2 w-2 rounded-full bg-mint shadow-[0_0_14px_rgba(120,242,179,.9)]"></span>
          AI Daily News Monitor
        </div>
        <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
          <section>
            <p class="mb-3 font-display text-sm uppercase tracking-[0.35em] text-slate-400">Last 24 Hours</p>
            <h1 class="max-w-4xl font-display text-4xl font-bold leading-tight text-white md:text-6xl">
              AI 產業日報
            </h1>
            <p id="headline" class="mt-5 max-w-3xl text-lg leading-8 text-slate-300">
              正在讀取最新 AI 新聞摘要...
            </p>
          </section>
          <section class="rounded-3xl border border-white/10 bg-white/5 p-6 shadow-glow backdrop-blur">
            <div class="flex items-center justify-between text-sm text-slate-400">
              <span>Last Updated</span>
              <span id="status" class="rounded-full border border-cyan-300/20 bg-cyan-300/10 px-3 py-1 text-cyan-200">Loading</span>
            </div>
            <p id="updatedAt" class="mt-4 font-display text-2xl font-semibold text-white">--</p>
            <p id="summary" class="mt-4 leading-7 text-slate-300">
              載入中，稍後將顯示技術突破、工具應用與產業影響三大面向。
            </p>
          </section>
        </div>
      </header>

      <section class="mb-10 grid gap-4 md:grid-cols-3">
        <div class="rounded-2xl border border-cyan-300/15 bg-panel/75 p-5 backdrop-blur animate-fade-rise opacity-0" style="animation-delay: .1s;">
          <p class="font-display text-sm uppercase tracking-[0.28em] text-cyan-200">Technical</p>
          <p class="mt-3 text-3xl font-bold text-white" id="technicalCount">0</p>
          <p class="mt-2 text-sm text-slate-400">模型、研究、晶片與基礎能力</p>
        </div>
        <div class="rounded-2xl border border-emerald-300/15 bg-panel/75 p-5 backdrop-blur animate-fade-rise opacity-0" style="animation-delay: .2s;">
          <p class="font-display text-sm uppercase tracking-[0.28em] text-emerald-200">Applications</p>
          <p class="mt-3 text-3xl font-bold text-white" id="applicationCount">0</p>
          <p class="mt-2 text-sm text-slate-400">產品、代理流程、企業導入與 API</p>
        </div>
        <div class="rounded-2xl border border-orange-300/15 bg-panel/75 p-5 backdrop-blur animate-fade-rise opacity-0" style="animation-delay: .3s;">
          <p class="font-display text-sm uppercase tracking-[0.28em] text-orange-200">Industry</p>
          <p class="mt-3 text-3xl font-bold text-white" id="industryCount">0</p>
          <p class="mt-2 text-sm text-slate-400">投資、法規、合作與市場競爭</p>
        </div>
      </section>

      <section class="grid gap-6 xl:grid-cols-3">
        <div class="rounded-3xl border border-cyan-300/15 bg-panel/85 p-6 shadow-glow backdrop-blur animate-fade-rise opacity-0" style="animation-delay: .35s;">
          <div class="mb-6 flex items-center justify-between">
            <div>
              <p class="font-display text-sm uppercase tracking-[0.28em] text-cyan-200">Technical Breakthroughs</p>
              <h2 class="mt-2 text-2xl font-semibold text-white">技術突破</h2>
            </div>
            <div class="h-12 w-1 rounded-full bg-cyan-300/70"></div>
          </div>
          <div id="technicalList" class="space-y-4"></div>
        </div>

        <div class="rounded-3xl border border-emerald-300/15 bg-panel/85 p-6 shadow-glow backdrop-blur animate-fade-rise opacity-0" style="animation-delay: .45s;">
          <div class="mb-6 flex items-center justify-between">
            <div>
              <p class="font-display text-sm uppercase tracking-[0.28em] text-emerald-200">Tool Applications</p>
              <h2 class="mt-2 text-2xl font-semibold text-white">工具應用</h2>
            </div>
            <div class="h-12 w-1 rounded-full bg-emerald-300/70"></div>
          </div>
          <div id="applicationsList" class="space-y-4"></div>
        </div>

        <div class="rounded-3xl border border-orange-300/15 bg-panel/85 p-6 shadow-glow backdrop-blur animate-fade-rise opacity-0" style="animation-delay: .55s;">
          <div class="mb-6 flex items-center justify-between">
            <div>
              <p class="font-display text-sm uppercase tracking-[0.28em] text-orange-200">Industry Impact</p>
              <h2 class="mt-2 text-2xl font-semibold text-white">產業影響</h2>
            </div>
            <div class="h-12 w-1 rounded-full bg-orange-300/70"></div>
          </div>
          <div id="industryList" class="space-y-4"></div>
        </div>
      </section>
    </main>

    <script>
      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderCard(item, accentClass) {
        return `
          <article class="rounded-2xl border border-white/8 bg-white/[0.03] p-5 transition duration-300 hover:-translate-y-1 hover:border-white/15 hover:bg-white/[0.05]">
            <div class="mb-3 flex items-center justify-between gap-3">
              <span class="rounded-full ${accentClass} px-3 py-1 text-xs font-semibold">${escapeHtml(item.company || "未分類")}</span>
              <span class="text-xs text-slate-500">${escapeHtml(item.publishedAt || "")}</span>
            </div>
            <h3 class="text-lg font-semibold leading-7 text-white">${escapeHtml(item.title)}</h3>
            <p class="mt-3 text-sm leading-7 text-slate-300">${escapeHtml(item.summary)}</p>
            <p class="mt-3 border-l-2 border-white/10 pl-4 text-sm leading-7 text-slate-400">${escapeHtml(item.whyItMatters)}</p>
            <a
              href="${escapeHtml(item.sourceUrl || "#")}"
              target="_blank"
              rel="noreferrer"
              class="mt-4 inline-flex text-sm text-cyan-200 transition hover:text-white"
            >
              來源：${escapeHtml(item.sourceName || "查看原文")}
            </a>
          </article>
        `;
      }

      function renderEmpty(message) {
        return `
          <div class="rounded-2xl border border-dashed border-white/10 bg-white/[0.02] p-5 text-sm leading-7 text-slate-400">
            ${escapeHtml(message)}
          </div>
        `;
      }

      function fillList(elementId, items, accentClass, emptyMessage) {
        const target = document.getElementById(elementId);
        if (!items || !items.length) {
          target.innerHTML = renderEmpty(emptyMessage);
          return;
        }

        target.innerHTML = items.map((item) => renderCard(item, accentClass)).join("");
      }

      async function loadNews() {
        try {
          const response = await fetch("./data.json", { cache: "no-store" });
          const data = await response.json();

          document.getElementById("headline").textContent = data.headline || "今日 AI 焦點";
          document.getElementById("updatedAt").textContent = data.generatedAtLocal || "尚未更新";
          document.getElementById("summary").textContent = data.summary || "目前沒有摘要。";
          document.getElementById("status").textContent = data.generatedAt ? "Ready" : "Pending";

          const technical = data.categories?.technicalBreakthroughs || [];
          const applications = data.categories?.toolApplications || [];
          const industry = data.categories?.industryImpact || [];

          document.getElementById("technicalCount").textContent = technical.length;
          document.getElementById("applicationCount").textContent = applications.length;
          document.getElementById("industryCount").textContent = industry.length;

          fillList("technicalList", technical, "bg-cyan-300/10 text-cyan-100", "最近 24 小時內尚未整理出明確技術突破。");
          fillList("applicationsList", applications, "bg-emerald-300/10 text-emerald-100", "最近 24 小時內尚未整理出新的工具應用亮點。");
          fillList("industryList", industry, "bg-orange-300/10 text-orange-100", "最近 24 小時內尚未整理出新的產業影響焦點。");
        } catch (error) {
          document.getElementById("headline").textContent = "資料載入失敗";
          document.getElementById("summary").textContent = "請確認後端服務已啟動，或檢查 /data.json 是否可讀取。";
          document.getElementById("status").textContent = "Error";
        }
      }

      loadNews();
    </script>
  </body>
</html>
